name: Build and push images

on:
  push:
    branches:
      - main
    paths:
      - images/**
      - .github/**

  # No path filter: the "Detect changed images" job is a required status check,
  # so it must run on every PR (path-filtered workflows never report → merge blocked).
  # Actual image builds stay gated by the matrix `if` below.
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  changed:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: images/**
          dir_names: true
          dir_names_max_depth: 2

      - name: Set matrix
        id: set-matrix
        run: |
          # Extract unique image directories
          IMAGES=$(echo '${{ steps.changed.outputs.all_changed_files }}' | tr ' ' '\n' | grep '^images/' | cut -d'/' -f2 | sort -u | jq -R . | jq -s -c '.')
          echo "matrix={\"image\":$IMAGES}" >> $GITHUB_OUTPUT
          echo "Images to build: $IMAGES"

  build:
    name: Build ${{ matrix.image }}
    needs: changed
    if: ${{ fromJSON(needs.changed.outputs.matrix).image[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.changed.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Extract version from Dockerfile
        id: version
        run: |
          VERSION=$(grep -m1 '^ARG.*VERSION=' images/${{ matrix.image }}/Dockerfile | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version for ${{ matrix.image }}: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log into ghcr.io
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: images/${{ matrix.image }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/smauermann/${{ matrix.image }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

